# ── docker-compose.yml ──────────────────────────────────────────────────────
#
# HOW THE ${...} VARIABLES WORK:
#   You never edit this file.
#   Docker reads the values from your .env file automatically.
#   Example: ${DATABASE_NAME} → reads DATABASE_NAME=nanbar_db from .env
#
# COMMANDS:
#   First time / after code changes:  docker compose up --build
#   Normal start:                      docker compose up
#   Stop:                              docker compose down
#   Stop + wipe database:              docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DATABASE_NAME}       # reads from .env
      POSTGRES_USER:     ${DATABASE_USER}       # reads from .env
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}   # reads from .env
    volumes:
      - postgres_data:/var/lib/postgresql/data  # data persists between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Django Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env                  # loads ALL variables from .env into Django
    environment:
      DATABASE_HOST: db             # override host — inside Docker, postgres is reachable at "db" not "localhost"
    ports:
      - "8000:8000"                 # your machine port : container port
    depends_on:
      db:
        condition: service_healthy  # waits for postgres healthcheck to pass
    volumes:
      - ./backend:/app              # live code sync — edit .py files without rebuilding

  # ── 3. Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api  # browser calls this URL
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

# ── Named volume — database data lives here ───────────────────────────────────
volumes:
  postgres_data: